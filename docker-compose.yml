version: '3.8'

services:
  ai-time-planning:
    image: ${REGISTRY:-localhost}/ai-time-planning:${TAG:-latest}
    container_name: ai-time-planning
    ports:
      - "${PORT:-8080}:80"
    environment:
      # Keine Umgebungsvariablen nötig - alles wird zur Build-Zeit konfiguriert
    restart: unless-stopped
    # Optional: Health Check
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
