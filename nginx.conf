server {
    listen 80 default_server;
    server_name _;
    
    root /usr/share/nginx/html;
    index index.html;

    # Alle Assets mit Hash-Namen lange cachen (immutable)
    location ~* ^/assets/.*\.[a-f0-9]{8}\..*$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Favicon und andere statische Dateien
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Main HTML + Service Worker: nicht cachen oder kurz cachen
    location ~* ^/(index\.html|flutter_service_worker\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # Flutter JS/CSS: nicht cachen
    location ~* \.(js|css)$ {
        add_header Cache-Control "no-cache, max-age=0";
    }

    # SPA: Alle unbekannten Routen zu index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Gzip-Kompression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1000;
}
