server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA-Routing: unbekannte Pfade auf index.html zurückfallen lassen
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets aggressiv cachen
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff2?|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Service Worker / Manifest nicht cachen
    location ~* (flutter_service_worker\.js|manifest\.json)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm;
}
