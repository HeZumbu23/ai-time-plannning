name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release \
          --dart-define=SUPABASE_PUBLISHABLE_KEY="${{ secrets.SUPABASE_PUBLISHABLE_KEY }}"

      - name: Extract version
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "version=${TAG}" >> $GITHUB_OUTPUT

      - name: Create Release with APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ai-time-planning-android-${{ steps.version.outputs.version }}
          files: |
            build/app/outputs/flutter-apk/app-release.apk
          body: |
            # Android Release: ${{ steps.version.outputs.version }}
            
            **APK Download:**
            - `app-release.apk` - Android 5.0+ (API Level 21+)
            
            **Installation:**
            1. Download die APK Datei
            2. Auf Android Gerät kopieren oder direkt installieren
            3. App starten und Supabase Key eingeben
            
            **Features:**
            - Tagesplan
            - Wochenplan
            - Backlog
            - Projekte
            - Plus-Button zum Task hinzufügen
            
            **Requirements:**
            - Android 5.0 oder neuer
            - Internet-Verbindung (für Supabase)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
